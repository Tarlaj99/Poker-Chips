<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        body {
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            max-width: 600px;
            flex-direction: column;
            align-items: center;
            margin: 40px auto;
            padding: 20px;
            background-color: black;
        }

        h1{
            text-shadow: 0px 0px 10px rgb(177, 177, 177);
            display: block;
            color: white;
            margin: 0 0 20px 0;
        }

        form {
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-top: 20px;
        }

        input, button, label {
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }
        input{
            border: none;
            color: rgb(255, 0, 204);
            text-shadow: 0px -1px 5px rgb(238, 0, 255);
            font-size: 25px;
            background-color: black;
        }

        label{
            margin-bottom: 0px;
            text-align: start;
            border: none;
            color: rgb(255, 0, 204);
            text-shadow: 0px -1px 2px rgb(238, 0, 255);
            font-size: 25px;
        }
        input:focus{
            outline: none;
        }

        .box {
            margin: 0;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 10px;
        }

        .card{
            margin: 2%;
            padding: 2em;
            width: 50%;
            height: 100%;
            background-color: #1c1f2b;
            text-align: center;
            border-radius: 10px;
            position: relative;
        }

        @property --angle{
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }
        .card::after, .card::before{
            z-index: -999;
            content: '';
            position: absolute;
            height: 100%;
            width: 100%;
            /* background-image: conic-gradient(from var(--angle),yellow, red, rgb(217, 10, 189), rgb(124, 0, 219), blue, cyan, rgb(10, 209, 10), yellow); */
            background-image: conic-gradient(from var(--angle), rgb(170, 52, 255), rgb(246, 139, 238) 20%, rgb(170, 52, 255));
            /* background-image: conic-gradient(from var(--angle), rgb(170, 52, 255), rgb(246, 139, 238) 20%, rgb(170, 52, 255)); */
            /* background-image: conic-gradient(from var(--angle), rgb(170, 52, 255), rgb(246, 139, 238) 20%, rgb(170, 52, 255)); */
            animation: 3s spin linear infinite;
            top: 50%; left: 50%;
            translate: -50% -50%;
            /* zeby nie miec tla w  boxie */
            padding: 3px;
            border-radius: 10px;
        }
        @keyframes spin{
            from{
                --angle: 0deg;
            }
            to{
                --angle: 360deg;
            }
        }

        .card::before{
            filter: blur(1.5rem);
        }

        .login{
            color: rgb(144, 14, 200);
            margin-top: 10%;
            text-align: left;
        }
        a{
            color: rgb(144, 14, 200);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="box">
            <h1>Registration</h1> 
            <form action="/register" method="post">
                <input type="text" name="username" placeholder="Username" required>
                <input type="text" name="password" placeholder="Password" required>
                <input type="submit" value="Register">
            </form>
            <div class="login">
                <p>Already have an account?</p>
                <a href="/login">Sign up</a>
            </div>
        </div>
    </div>
    <script>
        const form = document.querySelector('form');

        form.addEventListener('submit', async (event) => {
            
        });
    </script>
</body>
</html>
