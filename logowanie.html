<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        body {
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            max-width: 600px;
            flex-direction: column;
            align-items: center;
            margin: 40px auto;
            padding: 20px;
            background-color: black;
        }

        h1, #error{
            text-shadow: 0px 0px 10px rgb(177, 177, 177);
            display: block;
            color: white;
        }
        #error{
            margin-top: 10px;
            min-height: 1px;
            max-height: 1px;
        }
        form {
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-top: 20px;
        }

        input, button {
            border-radius: 10px;
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }
        input{
            border: none;
            color: rgb(255, 0, 204);
            text-shadow: 0px -1px 5px rgb(238, 0, 255);
            font-size: 25px;
            background-color: black;
        }
        input[type='text']{
            height: 30px;
        }

        input[type='button']{
            height: 80px;
        }
        input:focus{
            outline: none;
        }

        .box {
            margin: 0;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 10px;
        }
        /* .card, #box{
            filter: blur(0.2em);
            transition: filter 0.5s;
        } */
        .card{
            margin: 2%;
            padding: 2em;
            width: 50%;
            height: 100%;
            background-color: #1c1f2b;
            text-align: center;
            border-radius: 10px;
            position: relative;
        }

        @property --angle{
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }
        .card::after, .card::before{
            z-index: -999;
            content: '';
            position: absolute;
            height: 100%;
            width: 100%;
            /* background-image: conic-gradient(from var(--angle),yellow, red, rgb(217, 10, 189), rgb(124, 0, 219), blue, cyan, rgb(10, 209, 10), yellow); */
            /* background-image: conic-gradient(from var(--angle), transparent 60%, rgb(255, 0, 234)); */
            /* background-image: conic-gradient(from var(--angle), rgb(244, 24, 123),rgb(224, 35, 252),rgb(107, 17, 171), rgb(244, 24, 123)); */
            background-image: conic-gradient(from var(--angle), rgb(170, 52, 255), rgb(246, 139, 238) 20%, rgb(170, 52, 255));
            animation: 2s spin linear infinite;
            top: 50%; left: 50%;
            translate: -50% -50%;
            padding: 3px;
            border-radius: 10px;
        }
        @keyframes spin{
            from{
                --angle: 0deg;
            }
            to{
                --angle: 360deg;
            }
        }

        .card::before{
            filter: blur(1.5rem);
        }
        button{
            color: white;
            text-shadow: 0 0 8px black;
            background-color: rgb(227, 174, 227); 
            border: 2px solid rgb(213, 102, 209);
            margin: 8px;
            width: 65px;
            text-align: center;
        }
        form > button:active{
            transform: scale(0.95);
        }
        .register{
            color: rgb(144, 14, 200);
            margin-top: 10%;
            text-align: left;
        }
        a{
            color: rgb(144, 14, 200);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="box">
            <h1>Sign in</h1>
            <form action="/login" method="post" id="form">
                <input type="text" name="username" placeholder="Username" id="Username" required>
                <input type="password" name="password" placeholder="Password"  id="Password" required>
                <input type="submit" value="Enter">
                <h2 id="error"></h2>
                <div id="register" class="register">
                    <p>Don't have an account yet?</p>
                    <a onclick="change()">Sign up</a>
                </div>
            </form>
        </div>
    </div>
    <script>
        const form = document.getElementById('form');
        const h1 = document.querySelector('h1');
        const a = document.querySelector('a');
        const p = document.querySelector('p');
        const error = document.getElementById('error');
        const username = document.getElementById('Username');
        const password = document.getElementById('Password');

        function change(){
            if(a.textContent === 'Sign in'){
                h1.textContent = 'Sign in';
                form.action = '/login';
                p.textContent = "Don't have an account yet?";
                a.textContent = 'Sign up';
            } 
            else if(a.textContent === 'Sign up'){
                h1.textContent = 'Sign up';
                form.action = '/register';
                p.textContent = "Already have an account?";
                a.textContent = 'Sign in';
                
            }
            username.value = '';
            password.value = '';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = new URLSearchParams(new FormData(form));

            const response = await fetch(form.action, {
                method: 'POST',
                body: data,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            const result = await response.json();

            if (!response.ok) {
                error.textContent = result.error || 'Login failed';
                setTimeout(() =>{
                    error.textContent = '';
                },1500)
                return;
            }
            
            window.location.href = result.redirect;
        });
    </script>
</body>
</html>
