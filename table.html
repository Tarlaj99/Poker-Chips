<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <style>
        body {
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            max-width: 600px;
            flex-direction: column;
            align-items: center;
            margin: 40px auto;
            padding: 20px;
            background-color: black;
        }

        h1{
            text-shadow: 0px 0px 10px rgb(177, 177, 177);
            display: block;
            color: white;
            margin: 0 0 20px 0;
        }

        input, button, label {
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }

        input, button{
            cursor: pointer;
        }

        input{
            border: none;
            margin-top: 20px;
            color: rgb(255, 0, 204);
            text-shadow: 0px -1px 5px rgb(238, 0, 255);
            box-shadow: 0 0 5px black;
            font-size: 25px;
            background-color: rgb(23, 23, 23);
        }

        label{
            margin-bottom: 0;
            text-align: start;
            border: none;
            color: rgb(255, 0, 204);
            text-shadow: 0px -1px 2px rgb(238, 0, 255);
            font-size: 25px;
        }
        input:focus{
            outline: none;
        }

        .box {
            margin: 0;
            border: 1px solid #ccc;
            padding: 20px;
            height: 100%;
            border-radius: 10px;

            display: flex;
            flex-direction: column;
            justify-content: space-between;

            box-sizing: border-box;
        }

        .card{
            margin: 2%;
            padding: 2em;
            height: 325px;
            width: 50%;
            background-color: #1c1f2b;
            text-align: center;
            border-radius: 10px;
            position: relative;
        }

        @property --angle{
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }
        .card::after, .card::before{
            z-index: -999;
            content: '';
            position: absolute;
            height: 100%;
            width: 100%;
            /* background-image: conic-gradient(from var(--angle),yellow, red, rgb(217, 10, 189), rgb(124, 0, 219), blue, cyan, rgb(10, 209, 10), yellow); */
            background-image: conic-gradient(from var(--angle), rgb(170, 52, 255), rgb(246, 139, 238) 20%, rgb(170, 52, 255));
            /* background-image: conic-gradient(from var(--angle), rgb(170, 52, 255), rgb(246, 139, 238) 20%, rgb(170, 52, 255)); */
            /* background-image: conic-gradient(from var(--angle), rgb(170, 52, 255), rgb(246, 139, 238) 20%, rgb(170, 52, 255)); */
            animation: 3s spin linear infinite;
            top: 50%; left: 50%;
            translate: -50% -50%;
            /* zeby nie miec tla w  boxie */
            padding: 3px;
            border-radius: 10px;
        }
        @keyframes spin{
            from{
                --angle: 0deg;
            }
            to{
                --angle: 360deg;
            }
        }

        .card::before{
            filter: blur(1.5rem);
        }

        .login{
            color: rgb(144, 14, 200);
            margin-top: 10%;
            text-align: left;
        }
        a{
            color: rgb(144, 14, 200);
        }
        .Lobby_button{
            background-color: #131313;
            color: white;
            width: 60%;
            border: 2px solid rgb(255, 66, 242);
            box-shadow: 0 0 5px rgb(255, 66, 242);
            text-shadow: 0px 0px 5px rgb(248, 0, 248);
            margin-bottom: 20px;
            scale: 1.3;
            animation: 4s button infinite;
            transition: all 0.2s;
        }
        .Lobby_button:hover {
            transform: scale(1.01);
            box-shadow: 0 0 10px rgb(255, 66, 242);
        }
        form {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            box-sizing: border-box;
            margin: 20px;
            display: none;

        }
        input{
            margin-top: 5px;
            width: 200px;
            box-shadow: 0 0 5px rgb(255, 66, 242);
        }
        a{
            margin-bottom: 20px;
        }
        .container{
            margin: 10% 0 0 0;
            height: 325;
            display: flex;
            flex-direction: column;
            justify-content: start;
            align-items: center;
        }
        #strzalka{
            display: none;
            cursor: pointer;
            text-align: start;
            font-size: 30px;
            color: white;
            text-shadow: 0px 0px 10px rgb(177, 177, 177);
            width: 100%;
            text-align: start;
        }

        #error{
            /* position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%); */
            font-size: 23px;
            text-shadow: 0 0 20px rgb(177, 177, 177);
            color: white;
            min-height: 1px;
            max-height: 1px;

        }
    </style>
</head>
<body>
    <div class="card"id="card">
        <div class="box" id="box">
            <h1 id="tytul">E-CHIPS.com</h1> 

            <div class="container">
                
                <button class="Lobby_button" onclick="pokaz_form('/join_table')">Join Table</button>
                <button class="Lobby_button" onclick="pokaz_form('/create_table')">Create Table</button>
            
                <form action="/join_table" method="post" id="form" style="display: none;">
                    <label for="id" >Enter table ID</label>
                    <input type="text" name="id" autocomplete="off">
                </form>
                <h1 id="error"></h1>
                <p id="strzalka" onclick="back()"> ← </p> 
            </div>          
        </div>
    </div>
    <script>
        const box = document.getElementById('box');
        const card = document.getElementById('card');
        const form = document.querySelector('form');
        const buttons = document.querySelectorAll('button');
        const tytul = document.getElementById('tytul');
        const error = document.getElementById('error');
        const input = document.querySelector('input');
        let primal_text = tytul.textContent;

        function pokaz_form(action) {

            form.action = action;
            form.style.display = 'block';

            buttons.forEach(button => {
                button.style.display = 'None';
            });
            document.getElementById('strzalka').style.display = 'block';

            if(action == '/join_table') tytul.textContent = 'JOIN TABLE';
            else tytul.textContent = 'CREATE TABLE';

            input.focus();
        }
        
        function back(){
            document.getElementById('strzalka').style.display = 'none';

            form.style.display = 'none';
            error.textContent = '';
            tytul.textContent = primal_text;
            buttons.forEach(button => {
                button.style.display = 'block';
            });
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const data = new URLSearchParams(new FormData(form));

            const response = await fetch(form.action, {
                method: 'POST',
                body: data,
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                }
            });

            const result = await response.json(); 

            if (!response.ok) {
                error.textContent = result.error;
                
                setTimeout(() => {
                    error.textContent = '';
                    return;
                }, 2000);

                return;
            }
            window.location.href = result.redirect;
        });
    </script>
</body>
</html>
