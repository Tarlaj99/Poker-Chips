<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pula</title>
    <style>
        .card h1{
            text-shadow: 0px 0px 10px white;
            display: block;
            color: white;
            margin: 0 0 20px 0;
        }
        
        span, strong{
            font-weight: bold;
        }
        body {
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            max-width: 600px;
            flex-direction: column;
            align-items: center;
            margin: 40px auto;
            padding: 20px;
            background-color: black;
        }

        form {
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-top: 20px;
        }

        input, button {
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }
        input{
            border: none;
            color: rgb(255, 0, 204);
            text-shadow: 0 0 5px red;
            height: 30px;
            font-size: 25px;
            background-color: black;
        }
        input:focus{
            outline: none;
        }

        .box {
            margin: 0;
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 10px;
        }
        /* .card, #box{
            filter: blur(0.2em);
            transition: filter 0.5s;
        } */
        .card{
            margin: 2%;
            padding: 2em;
            width: 50%;
            height: 100%;
            background-color: #1c1f2b;
            text-align: center;
            border-radius: 10px;
            position: relative;
        }

        @property --angle{
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }
        .card::after, .card::before{
            z-index: -999;
            content: '';
            position: absolute;
            height: 100%;
            width: 100%;
            /* background-image: conic-gradient(from var(--angle),yellow, red, rgb(217, 10, 189), rgb(124, 0, 219), blue, cyan, rgb(10, 209, 10), yellow); */
            /* background-image: conic-gradient(from var(--angle), transparent 60%, rgb(255, 0, 234)); */
            background-image: conic-gradient(from var(--angle), rgb(244, 24, 123),rgb(224, 35, 252),rgb(107, 17, 171), rgb(244, 24, 123));
            /* background-image: conic-gradient(from var(--angle), rgb(170, 52, 255), rgb(246, 139, 238) 20%, rgb(170, 52, 255)); */
            animation: 2s spin linear infinite;
            top: 50%; left: 50%;
            translate: -50% -50%;
            /* zeby nie miec tla w  boxie */
            padding: 3px;
            border-radius: 10px;
        }
        @keyframes spin{
            from{
                --angle: 0deg;
            }
            to{
                --angle: 360deg;
            }
        }

        .card::before{
            filter: blur(1.5rem);
        }
        #money{
            text-shadow: 0px 0px 10px rgb(255, 255, 255);
            font-size: 35px;
        }
        #pot{
            text-shadow: 0 0 15px rgb(255, 0, 0);
            font-size: 40px;
        }
        #highest_bet{
            text-shadow: 0 0 10px rgb(140, 0, 255);
            font-size: 35px;
        }
        #player_bet{
            text-shadow: 0 0 10px rgb(49, 156, 232);
            font-size: 35px;
        }
        #fold{
            background-color: rgb(200, 1, 1); 
            color: white;
            text-shadow: 0 0 8px black;
            margin-top: 35px;
            border: 2px solid rgb(145, 3, 3);
        }
        form > button:active{
            transform: scale(0.95);
        }
        #permission{
            display: none; 
            margin-top: 100px;
        }
        .buttons_container{
            height: 125px;
        }
        .buttons_container button{
            font-family: serif;
            text-shadow: 0 0 15px white;
            background-color: rgb(68, 68, 68);

            color: white;
            border: 2px solid black;
            border-radius: 8px;
            width: 70px;
            text-align: center;
            
        }
        button[name='action']{
            transition: 0.2s transform;
        }

        button[name='action']:hover{
            scale: 1.05;
        }
        .tableInfo{
            position: absolute;
            top: 2%;
            right: 2%;
            display: flex;

            margin: 0;
            padding: 0;
        }
        .tableInfo #tableID{
            text-shadow: 0px 0px 10px white;
        }
        #leave{
            position: absolute;
            top: 2%;
            left: 2%;

            border: 2px solid white;
            background-color: rgb(167, 167, 167);
            color: white;
            box-shadow: 0 0 10px white;
            color: black;
        }
        #winner{
            position: fixed;
            display: none;
            inset: 0;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            background-color: rgba(0, 0, 0, 0.75);
        }

        #winner_button{
            display: block;
            padding: 25px 50px;
            font-size: 35px;
            border: block;
            border-radius: 12px;
            color: black;
            background-color: white;
            box-shadow: 0 0 30px white;
            cursor: pointer;
        }
        #winner_announcement{
            display: none;
        }
        .range_container{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .range_container button{
            background: none;
            border: none;
            font-size: 24px;
           
            display: flex;
            align-items: center;
            justify-content: center;

            margin: 5px 10px 0 10px;
            color: white;
            text-shadow: 0 0 5px white;
        }
        #bet_value{
            font-size: 30px; 
            text-shadow: 0 0 15px white;
            min-height: 30px;
            max-height: 30px;
        }
    </style>
</head>
<body>
    <div id="winner">
        <h1 id="winner_announcement"></h1>
        <button id="winner_button" type="submit" onclick="take_pot()"><b>Take pot</b></button>
    </div>
    
    <button id="leave" onclick="leave_table()">Leave table</button>
    
    <div class="tableInfo">
        <h2 id="tableID"></h2>
    </div>
    <div class="card" id="card">
        <div class="box" id="box">
            <h1 id="round">Pre-flop</h1> 
            <p>
                <strong>Money:</strong><br>
                <span id="money">$1000</span>
            </p>
            <p>
                <strong>Pot:</strong><br>
                <span id="pot">$0</span>
            </p>


            <p>
                <strong>Highest bet:</strong><br>
                <span id="highest_bet">$0</span>
            </p>
            <p>
                <strong>Your bet:</strong><br>
                <span id="player_bet">$0</span>
            </p>
            <form action="" method="post">
                <div class="range_container">
                    <button onclick="substract_input_value()" type="button">-</button>
                    <input type="range" min="2" step="2" name="bet" id="bet_input">
                    <button onclick="add_input_value()" type="button">+</button>
                </div>
                
                <h1 id="bet_value"></h1>

                <br>
                <div class="buttons_container">
                     <div>
                        <button type="submit" name="action" class="action" value="check">Check</button>
                        <button type="submit" name="action" class="action" value="raise">Raise</button>
                        <button type="submit" name="action" class="action" value="call">Call</button>    
                    </div>
                    <button type="submit" name="action" class="action" value="fold" id="fold">FOLD</button>
                </div>
            </form>
        </div>
    </div>

    <ol>
        
    </ol>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const rounds = ['Pre-flop','Flop','Turn','River'];

        const form = document.querySelector('form');
        const tableID = document.getElementById('tableID');
        const round = document.getElementById('round');

        const money = document.getElementById('money');
        const pot = document.getElementById('pot');
        const highest_bet = document.getElementById('highest_bet');
        const player_bet = document.getElementById('player_bet');

        const bet_value = document.getElementById('bet_value');
        const bet_input = document.getElementById('bet_input');

        const winner = document.getElementById('winner');
        const winner_announcement = document.getElementById('winner_announcement');
        const winner_button = document.getElementById('winner_button');

        let myMoney = 0;

        socket.on('connect', () => {
            socket.emit('join_table');
        });

        bet_input.addEventListener('input', () => {
            bet_value.textContent = (Number(bet_input.value) !== Number(bet_input.max))
                ? "$" + bet_input.value
                : "All in";
        });

        function render_sidepots(sidepotsData){
            if (!Array.isArray(sidepotsData) || sidepotsData.length === 0) {
                return;
            }

            pot.textContent = sidepotsData
                .map(sidepot => `$${sidepot.amount}`)
                .join(' , ');
        }

        /* wczytuje cały stan stołu. Przydatne jak się dołącza */
        async function state(){
            const info_response = await fetch('/state');
            const info = await info_response.json();

            if (!info_response.ok) {
                bet_value.textContent = info.error;
                return;
            }

            myMoney = Number(info.money);
            if(myMoney === 0){
                bet_value = 'You lost'
                document.querySelector('body').style.filter = "brightness(50%)";
            }
            tableID.textContent = "ID: " + info.tableID;
            money.textContent = "$" + info.money;
            if (Array.isArray(info.sidepots) && info.sidepots.length > 0)
                render_sidepots(info.sidepots);
            else
                pot.textContent = "$" + info.pot;

            highest_bet.textContent = "$" + info.highest_bet;
            player_bet.textContent = "$" + info.player_bet;
            round.textContent = rounds[info.round] || 'Showdown';
            bet_input.value = bet_input.min;
            bet_value.textContent = String(bet_input.value);
            document.querySelector('body').style.filter = info.folded ? "brightness(50%)" : "none";

            set_bet_values(info.highest_bet, myMoney);
        }
        state();

        /* sockety */
        socket.on("update", (dane) => {
            if(dane.next_round_ready) {
                player_bet.textContent = "$0";
            }

            round.textContent = rounds[dane.round] || 'Showdown';
            highest_bet.textContent = "$" + dane.highest_bet;
            if (Array.isArray(dane.sidepots) && dane.sidepots.length > 0)
                render_sidepots(dane.sidepots);
            else
                pot.textContent = "$" + dane.pot;

            set_bet_values(dane.highest_bet, myMoney);
        });

        socket.on("next hand", (dane) => {
            if (dane) {
                if (Array.isArray(dane.sidepots) && dane.sidepots.length > 0)
                    render_sidepots(dane.sidepots);
                else
                    pot.textContent = "$" + dane.pot;

                highest_bet.textContent = "$" + dane.highest_bet;
            }

            if(document.querySelector('body').style.filter === 'none'){
                winner.style.display = 'flex';
                winner_button.style.display = 'flex';
                winner_announcement.style.display = 'none';
            }
        });

        /* move */
        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const button = event.submitter;

            if(button.value === "raise" && bet_value.textContent === ''){
                bet_input.value = bet_input.min;
            }

            if (button.value === "raise" && bet_input.disabled) {
                bet_value.textContent = 'You cannot raise. Call or fold.';
                return;
            }

            const data = new URLSearchParams(new FormData(form, button));

            const response = await fetch('/move', {
                method: 'POST',
                body: data,
                headers: {'Content-Type': 'application/x-www-form-urlencoded'}
            });

            const result = await response.json();

            if (!response.ok) {
                bet_value.textContent = result.error;
                return;
            }

            myMoney = Number(result.money);

            if(result.action === "fold"){
                document.querySelector('body').style.filter = "brightness(50%)";
            }

            money.textContent = "$" + result.money;
            player_bet.textContent = "$" + result.player_bet;

            set_bet_values(Number(highest_bet.textContent.replace('$','')), myMoney);
        });

        /* WINNER */
        socket.on("winner", (dane) => {
            winner_button.style.display = 'none';
            winner_announcement.textContent = dane.winner + " has won $" + dane.amount + "!";
            winner_announcement.style.display = 'block';

            if (Array.isArray(dane.sidepots)) {
                render_sidepots(dane.sidepots);
            }

            setTimeout(() => {
                winner.style.display = 'none';
                winner_button.style.display = 'none';
                winner_announcement.style.display = 'none';
                document.querySelector('body').style.filter = "none";
                state();
            }, 2000);
        });

        function take_pot(){
            winner.style.display = 'none';
            socket.emit('I_won');
        }

        async function leave_table(){
            await fetch('/leave_table');
            window.location.href = '/';
        }

        function substract_input_value(){
            if (bet_input.disabled) return;

            bet_input.value = Math.max(
                Number(bet_input.min),
                Number(bet_input.value) - 2
            );

            bet_value.textContent = (Number(bet_input.value) !== Number(bet_input.max))
                ? "$" + bet_input.value
                : "All in";
        }

        function add_input_value(){
            if (bet_input.disabled) return;

            bet_input.value = Math.min(
                Number(bet_input.max),
                Number(bet_input.value) + 2
            );

            bet_value.textContent = (Number(bet_input.value) !== Number(bet_input.max))
                ? "$" + bet_input.value
                : "All in";
        }

        function set_bet_values(highestBet, availableMoney){
            highestBet = Number(highestBet);
            availableMoney = Number(availableMoney);

            const minRaise = highestBet === 0 ? 2 : highestBet * 2;

            if (availableMoney <= 0) {
                bet_input.disabled = true;
                bet_input.min = 0;
                bet_input.max = 0;
                bet_input.value = 0;
                bet_value.textContent = 'All in';
                return;
            }

            if (minRaise <= availableMoney) {
                bet_input.disabled = false;
                bet_input.min = minRaise;
                bet_input.max = availableMoney;

                if (Number(bet_input.value) < minRaise || Number(bet_input.value) > availableMoney) {
                    bet_input.value = minRaise;
                }
                bet_value.textContent = '';
                return;
            }
            bet_input.disabled = true;
            bet_input.min = availableMoney;
            bet_input.max = availableMoney;
            bet_input.value = availableMoney;
            bet_value.textContent = ' Call / fold';
        }

    </script> 
</body>
</html>
